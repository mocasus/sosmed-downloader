<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoyDL — TikTok · Instagram · X Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #E05540, #ff6b6b, #ff4d7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .platform-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .platform-tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #111;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .platform-tab.active {
            background: #E05540;
            border-color: #E05540;
            color: #fff;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #E05540;
        }
        .input-group input::placeholder {
            color: #555;
        }
        .btn-download {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #E05540, #c83c28);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn-download:hover {
            transform: scale(1.02);
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 24px;
            border-radius: 16px;
            background: #111;
            border: 1px solid #222;
            overflow: hidden;
            text-align: left;
            display: none;
        }
        .result.show { display: block; }
        .result-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
        }
        .result-header img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }
        .result-info h3 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        .result-info p {
            font-size: 0.75rem;
            color: #666;
        }
        .result-body {
            padding: 16px 20px;
        }
        .result-body video, .result-body img {
            width: 100%;
            border-radius: 10px;
            max-height: 400px;
            object-fit: contain;
            background: #000;
        }
        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .result-actions a {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid #333;
            transition: all 0.15s;
        }
        .result-actions a.primary {
            background: #E05540;
            border-color: #E05540;
        }
        .result-actions a:hover {
            opacity: 0.85;
        }
        .error {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.2);
            color: #ff6b6b;
            font-size: 0.85rem;
            display: none;
        }
        .error.show { display: block; }
        .loading {
            display: none;
            margin-top: 16px;
        }
        .loading.show { display: inline-block; }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #333;
            border-top-color: #E05540;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .features {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .feature {
            padding: 10px 16px;
            border-radius: 10px;
            background: #111;
            border: 1px solid #222;
            font-size: 0.75rem;
            color: #888;
        }
        .feature span { color: #E05540; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MoyDL</div>
        <p class="subtitle">Download TikTok · Instagram · X/Twitter — No Watermark</p>

        <div class="platform-tabs">
            <button class="platform-tab active" data-platform="auto">🔍 Auto</button>
            <button class="platform-tab" data-platform="tiktok">TikTok</button>
            <button class="platform-tab" data-platform="instagram">Instagram</button>
            <button class="platform-tab" data-platform="x">X / Twitter</button>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste link TikTok / IG / X di sini..." autofocus>
            <button class="btn-download" id="btnDownload" onclick="download()">Download</button>
        </div>

        <div class="loading" id="loading"><span class="spinner"></span> Memproses...</div>
        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-header">
                <img id="resultCover" src="" alt="">
                <div class="result-info">
                    <h3 id="resultTitle"></h3>
                    <p id="resultMeta"></p>
                </div>
            </div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-actions" id="resultActions"></div>
        </div>

        <div class="features">
            <div class="feature">🎵 <span>No Watermark</span></div>
            <div class="feature">📹 <span>HD Video</span></div>
            <div class="feature">⚡ <span>Fast</span></div>
            <div class="feature">🔒 <span>No Login</span></div>
        </div>
    </div>

    <script>
        let platform = 'auto';

        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                platform = this.dataset.platform;
            });
        });

        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') download();
        });

        async function download() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            const btn = document.getElementById('btnDownload');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            btn.disabled = true;
            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');

            try {
                const endpoint = platform === 'auto' ? '/api/download' : `/api/${platform}`;
                const resp = await fetch(`${endpoint}?url=${encodeURIComponent(url)}`);
                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.detail || 'Gagal download');
                }

                // Render result
                document.getElementById('resultCover').src = data.cover || data.thumbnail || '';
                document.getElementById('resultTitle').textContent = data.title || data.text || data.author || '';
                document.getElementById('resultMeta').textContent = [
                    data.author ? '@' + data.author : '',
                    data.duration ? data.duration + 's' : '',
                    data.platform ? data.platform.toUpperCase() : ''
                ].filter(Boolean).join(' · ');

                const body = document.getElementById('resultBody');
                const actions = document.getElementById('resultActions');
                body.innerHTML = '';
                actions.innerHTML = '';

                // TikTok video
                if (data.video_no_watermark) {
                    body.innerHTML = `<video controls src="${data.video_no_watermark}" poster="${data.cover || ''}"></video>`;
                    actions.innerHTML = `
                        <a href="${data.video_no_watermark}" class="primary" download>📥 Download Video (No WM)</a>
                        ${data.music ? `<a href="${data.music}">🎵 Download Audio</a>` : ''}
                    `;
                }
                // Instagram / X media
                else if (data.media_url) {
                    if (data.type === 'video') {
                        body.innerHTML = `<video controls src="${data.media_url}"></video>`;
                    } else {
                        body.innerHTML = `<img src="${data.media_url}" alt="${data.title || ''}">`;
                    }
                    actions.innerHTML = `<a href="${data.media_url}" class="primary" download>📥 Download</a>`;
                }
                // X multiple media
                else if (data.media && data.media.length) {
                    body.innerHTML = data.media.map((m, i) => {
                        if (m.type === 'video' || m.type === 'gif') {
                            return `<video controls src="${m.url}" style="margin-bottom:8px"></video>`;
                        }
                        return `<img src="${m.url}" style="margin-bottom:8px;border-radius:10px">`;
                    }).join('');
                    actions.innerHTML = data.media.map((m, i) =>
                        `<a href="${m.url}" download>📥 Media ${i + 1}</a>`
                    ).join('');
                }

                result.classList.add('show');
            } catch (e) {
                error.textContent = '❌ ' + e.message;
                error.classList.add('show');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }
    </script>
</body>
</html>
