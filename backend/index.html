<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoyDL — TikTok · Instagram · X Downloader</title>
    <meta name="description" content="Download video TikTok, Instagram, dan X/Twitter tanpa watermark. Gratis, cepat, no login.">
    <meta name="theme-color" content="#e8396b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f2ed;
            --card: #fff;
            --fg: #111;
            --muted: #777;
            --border: #111;
            --pink: #e8396b;
            --pink-l: #ff6b8a;
            --yellow: #f5c842;
            --blue: #4da6ff;
            --green: #3dd68c;
            --orange: #ff8a4c;
            --purple: #b066ff;
            --shadow: 5px 5px 0 0 #111;
            --shadow-sm: 3px 3px 0 0 #111;
            --radius: 4px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Space Grotesk', 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(232,57,107,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(245,200,66,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(77,166,255,0.04) 0%, transparent 70%);
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 40px;
        }
        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--yellow);
            color: var(--fg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .hero-badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            border: 1.5px solid var(--border);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }
        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .hero h1 span {
            display: inline-block;
            background: var(--pink);
            color: #fff;
            padding: 2px 12px;
            transform: rotate(-2deg);
            box-shadow: var(--shadow-sm);
        }
        .hero p {
            font-size: 1.05rem;
            color: var(--muted);
            max-width: 440px;
            margin: 0 auto;
            line-height: 1.5;
        }
        /* Platform tabs */
        .platforms {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .platform-tab {
            padding: 10px 18px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            color: var(--fg);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.12s;
            box-shadow: var(--shadow-sm);
            letter-spacing: -0.01em;
        }
        .platform-tab:hover {
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 0 #111;
        }
        .platform-tab.active {
            background: var(--fg);
            color: #fff;
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 0 rgba(0,0,0,0.3);
        }
        /* Input card */
        .input-card {
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            position: relative;
        }
        .input-card::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1.5px dashed rgba(0,0,0,0.08);
            border-radius: 2px;
            pointer-events: none;
        }
        .input-row {
            display: flex;
            gap: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 16px 18px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--fg);
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all 0.15s;
            box-shadow: var(--shadow-sm);
        }
        .input-row input:focus {
            background: #fff;
            box-shadow: 5px 5px 0 0 var(--pink);
            border-color: var(--pink);
        }
        .input-row input::placeholder { color: #bbb; font-weight: 400; }
        .btn-dl {
            padding: 16px 32px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--pink);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: var(--shadow-sm);
            transition: all 0.12s;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .btn-dl:hover {
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 0 #111;
            background: var(--pink-l);
        }
        .btn-dl:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--shadow-sm);
        }
        .btn-dl:disabled:hover {
            background: var(--pink);
            box-shadow: var(--shadow-sm);
        }
        /* Loading skeleton */
        .loading-skeleton {
            display: none;
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
            animation: skeletonPulse 1.6s ease-in-out infinite;
        }
        .loading-skeleton.show { display: block; }
        .skeleton-top {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 22px;
            border-bottom: 2.5px solid var(--border);
        }
        .skeleton-avatar {
            width: 52px; height: 52px;
            border-radius: var(--radius);
            background: #eee;
            flex-shrink: 0;
        }
        .skeleton-lines { flex:1; display:flex; flex-direction:column; gap:8px; }
        .skeleton-line { height:12px; background:#eee; border-radius:2px; }
        .skeleton-line:first-child { width:60%; }
        .skeleton-line:last-child { width:40%; }
        .skeleton-media {
            height: 280px;
            background: #111;
            margin: 16px;
            border-radius: var(--radius);
            border: 2.5px solid var(--border);
        }
        .skeleton-actions {
            display: flex;
            gap: 10px;
            padding: 0 16px 20px;
        }
        .skeleton-btn {
            flex:1; height:50px;
            background:#eee;
            border-radius: var(--radius);
        }
        @keyframes skeletonPulse {
            0%,100% { opacity:0.6; }
            50% { opacity:1; }
        }
        /* Error */
        .error-msg {
            display: none;
            padding: 14px 18px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: #fff0f0;
            color: var(--pink);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .error-msg.show { display: block; }
        /* Result */
        .result {
            display: none;
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .result.show { display: block; }
        .result-top {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 22px;
            border-bottom: 2.5px solid var(--border);
            background: #fafafa;
        }
        .result-top .avatar {
            width: 52px; height: 52px;
            border-radius: var(--radius);
            border: 2.5px solid var(--border);
            object-fit: cover;
            background: var(--bg);
            box-shadow: var(--shadow-sm);
        }
        .result-top h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 3px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-top .meta {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }
        .result-top .platform-badge {
            margin-left: auto;
            padding: 4px 10px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 2px 2px 0 0 #111;
        }
        .badge-tt { background: var(--fg); color: #fff; }
        .badge-ig { background: var(--purple); color: #fff; }
        .badge-x  { background: var(--blue); color: #fff; }
        .result-media {
            padding: 16px;
        }
        .result-media video,
        .result-media img {
            width: 100%;
            border-radius: var(--radius);
            border: 2.5px solid var(--border);
            max-height: 500px;
            object-fit: contain;
            background: #000;
            box-shadow: var(--shadow-sm);
        }
        .result-media .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        .result-media .media-grid img,
        .result-media .media-grid video {
            aspect-ratio: 1;
            object-fit: cover;
            max-height: 200px;
        }
        .result-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            padding: 0 16px 20px;
        }
        .result-actions .btn-action {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s cubic-bezier(0.2,0,0,1);
            color: var(--fg);
            background: var(--card);
            position: relative;
            overflow: hidden;
            justify-content: center;
            text-align: center;
        }
        .result-actions .btn-action::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: background 0.15s;
        }
        .result-actions .btn-action:hover::after {
            background: rgba(0,0,0,0.03);
        }
        .result-actions .btn-action:hover {
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 0 #111;
        }
        .result-actions .btn-action:active {
            transform: translate(0,0);
            box-shadow: 2px 2px 0 0 #111;
        }
        .result-actions .btn-action .icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .result-actions .btn-action .label {
            text-align: left;
            line-height: 1.2;
        }
        .result-actions .btn-action .label small {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.65;
            margin-top: 1px;
        }
        .result-actions .btn-action.primary {
            background: var(--pink);
            color: #fff;
        }
        .result-actions .btn-action.primary:hover {
            background: var(--pink-l);
        }
        .result-actions .btn-action.accent {
            background: var(--yellow);
            color: var(--fg);
        }
        .result-actions .btn-action.accent:hover {
            background: #ffe066;
        }
        .result-actions .btn-action.outline {
            background: var(--card);
        }
        .result-actions .btn-action.outline:hover {
            background: #f9f9f9;
        }
        .result-actions .btn-action .badge-hd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--green);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 800;
            border-radius: 3px;
            border: 1.5px solid var(--border);
            letter-spacing: 0.05em;
            margin-left: 4px;
            box-shadow: 1px 1px 0 0 #111;
        }
        .result-actions .btn-dl-all {
            width: 100%;
            justify-content: center;
            background: var(--green) !important;
            color: #fff !important;
            font-size: 0.9rem;
            padding: 16px;
            letter-spacing: 0.02em;
        }
        .result-actions .btn-dl-all:hover {
            background: #4de8a0 !important;
        }
        .result-actions .divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            opacity: 0.15;
            margin: 4px 0;
        }
        /* Features strip */
        .features {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 44px;
        }
        .feature {
            padding: 10px 16px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            font-size: 0.78rem;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
        }
        .feature .emoji { margin-right: 4px; }
        /* Download toast */
        .download-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--fg);
            color: #fff;
            padding: 14px 24px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1.2);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .download-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .download-toast .toast-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .download-toast.success { background: var(--green); color: #fff; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Button downloading state */
        .btn-action.downloading {
            opacity: 0.6;
            pointer-events: none !important;
            cursor: not-allowed !important;
            user-select: none;
            position: relative;
        }
        .btn-action.downloading .icon {
            animation: bounceIcon 0.4s ease-in-out infinite;
        }
        @keyframes bounceIcon {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 36px;
            padding: 0 4px;
        }
        .footer-github {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 2.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            box-shadow: var(--shadow-sm);
            transition: all 0.15s cubic-bezier(0.2,0,0,1);
        }
        .footer-github:hover {
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 0 var(--pink);
        }
        .footer-github svg {
            width: 22px;
            height: 22px;
        }
        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 32px 16px 24px; }
            .hero h1 { font-size: 2.2rem; }
            .input-row { flex-direction: column; }
            .btn-dl { width: 100%; text-align: center; }
            .result-top { flex-wrap: wrap; }
            .result-top .platform-badge { margin-left: 0; }
            .result-media .media-grid { grid-template-columns: repeat(2,1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <div class="hero-badge"><span class="dot"></span> NO WATERMARK</div>

        <!-- Platform Tabs -->
        <div class="platforms">

        </div>

        <!-- Input -->
        <div class="input-card">
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="Paste link di sini... mis: https://vt.tiktok.com/..." autofocus>
                <button class="btn-dl" id="btnDownload" onclick="download()">⬇ Download</button>

        <div class="loading-skeleton" id="loading">
            <div class="skeleton-top">
                <div class="skeleton-avatar"></div>

                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>

                <div class="skeleton-btn"></div>
                <div class="skeleton-btn" style="flex:1.5"></div>
            </div>
        </div>
        <div class="error-msg" id="error"></div>

        <!-- Result -->
        <div class="result" id="result">
            <div class="result-top">
                <img class="avatar" id="resultCover" src="" alt="">
                <div>
                    <h3 id="resultTitle"></h3>
                    <div class="meta" id="resultMeta"></div>
                </div>
                <div class="platform-badge" id="resultPlatform"></div>
            </div>
            <div class="result-media" id="resultBody"></div>
            <div class="result-actions" id="resultActions"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="https://github.com/mocasus/sosmed-downloader" target="_blank" class="footer-github" title="Star di GitHub">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </div>
    <div class="download-toast" id="downloadToast"><span class="toast-spinner"></span><span id="toastText">Downloading...</span></div>
    </div>

    <script>
        let platform = 'auto';

        // Toast helper
        let toastTimer;
        function showToast(msg, success) {
            const t = document.getElementById('downloadToast');
            const txt = document.getElementById('toastText');
            clearTimeout(toastTimer);
            t.classList.remove('success');
            if (success) {
                t.classList.add('success');
                document.querySelector('#downloadToast .toast-spinner').style.display = 'none';
            } else {
                document.querySelector('#downloadToast .toast-spinner').style.display = '';
            }
            txt.textContent = msg;
            t.classList.add('show');
            if (success) {
                toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
            }
        }
        function hideToast() {
            document.getElementById('downloadToast').classList.remove('show');
        }

        // Force download via blob (bypasses cross-origin download restriction)
        function forceDownload(url, filename, btn) {
            // Prevent double-click
            if (btn && btn.classList.contains('downloading')) return false;

            const originalHTML = btn ? btn.innerHTML : '';
            if (btn) {
                btn.classList.add('downloading');
                const small = btn.querySelector('.label small');
                if (small) small.textContent = 'Mendownload...';
            }
            showToast('⬇️ Mendownload...', false);

            const a = document.createElement('a');
            a.style.display = 'none';
            document.body.appendChild(a);

            // Same-origin: use direct download attribute
            if (url.startsWith('/') || url.startsWith(window.location.origin)) {
                a.href = url;
                a.download = filename || '';
                a.click();
                setTimeout(() => {
                    if (btn) { btn.classList.remove('downloading'); btn.innerHTML = originalHTML; }
                    showToast('✅ Selesai!', true);
                }, 300);
            } else {
                // Cross-origin: fetch + blob
                fetch(url)
                    .then(r => r.blob())
                    .then(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        a.href = blobUrl;
                        a.download = filename || '';
                        a.click();
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                        if (btn) { btn.classList.remove('downloading'); btn.innerHTML = originalHTML; }
                        showToast('✅ Selesai!', true);
                    })
                    .catch(() => {
                        // Fallback: direct open
                        a.href = url;
                        a.target = '_blank';
                        a.download = '';
                        a.click();
                        if (btn) { btn.classList.remove('downloading'); btn.innerHTML = originalHTML; }
                        hideToast();
                    });
            }
            setTimeout(() => a.remove(), 100);
        }

        // Platform tabs
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                platform = this.dataset.platform;
            });
        });

        function downloadAll(e) {
            e.preventDefault();
            const el = e.target.closest('.btn-dl-all');
            const urls = el.dataset.urls.split(',');
            const types = el.dataset.types.split(',');
            const total = urls.length;
            const originalHTML = el.innerHTML;

            el.classList.add('downloading');
            showToast('⬇️ Downloading 0/' + total + '...', false);

            let done = 0;
            urls.forEach((u, i) => {
                const t = types[i];
                const dlUrl = (t === 'video' || t === 'gif')
                    ? '/api/proxy/media?url=' + u
                    : decodeURIComponent(u);
                const ext = t === 'video' ? '.mp4' : t === 'gif' ? '.gif' : '.jpg';
                const label = t === 'video' ? 'video' : t === 'gif' ? 'gif' : 'image';
                const fname = 'moydl_x_' + label + '_' + (i+1) + ext;
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    document.body.appendChild(a);

                    if (dlUrl.startsWith('/') || dlUrl.startsWith(window.location.origin)) {
                        a.href = dlUrl;
                        a.download = fname;
                        a.click();
                        done++;
                        showToast('⬇️ Downloading ' + done + '/' + total + '...', false);
                        if (done >= total) {
                            el.classList.remove('downloading');
                            el.innerHTML = originalHTML;
                            showToast('✅ Selesai! ' + total + ' files', true);
                        }
                    } else {
                        fetch(dlUrl)
                            .then(r => r.blob())
                            .then(blob => {
                                const blobUrl = URL.createObjectURL(blob);
                                a.href = blobUrl;
                                a.download = fname;
                                a.click();
                                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                                done++;
                                showToast('⬇️ Downloading ' + done + '/' + total + '...', false);
                                if (done >= total) {
                                    el.classList.remove('downloading');
                                    el.innerHTML = originalHTML;
                                    showToast('✅ Selesai! ' + total + ' files', true);
                                }
                            })
                            .catch(() => {
                                a.href = dlUrl;
                                a.target = '_blank';
                                a.click();
                                done++;
                                if (done >= total) {
                                    el.classList.remove('downloading');
                                    el.innerHTML = originalHTML;
                                    hideToast();
                                }
                            });
                    }
                    setTimeout(() => a.remove(), 100);
                }, i * 600);
            });
        }

        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') download();
        });

        async function download() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            const btn = document.getElementById('btnDownload');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            btn.disabled = true;
            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');

            try {
                const endpoint = platform === 'auto' ? '/api/download' : `/api/${platform}`;
                const resp = await fetch(`${endpoint}?url=${encodeURIComponent(url)}`);
                const data = await resp.json();

                if (!resp.ok) throw new Error(data.detail || 'Gagal download. Periksa link kamu.');

                // Cover
                const cover = data.cover || data.thumbnail || '';
                document.getElementById('resultCover').src = cover || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"><rect fill="%23f5f2ed" width="52" height="52"/></svg>';

                // Title
                document.getElementById('resultTitle').textContent = data.title || data.text || data.author || 'Tanpa judul';

                // Meta
                const metaParts = [];
                if (data.author) metaParts.push('@' + data.author);
                if (data.duration) metaParts.push(Math.floor(data.duration / 60) + ':' + String(data.duration % 60).padStart(2, '0'));
                if (data.tweet_id && data.likes !== undefined) metaParts.push('❤ ' + data.likes + ' · 🔁 ' + (data.retweets || 0));
                document.getElementById('resultMeta').textContent = metaParts.join(' · ') || data.platform || '';

                // Platform badge
                const badge = document.getElementById('resultPlatform');
                badge.textContent = (data.platform || '').toUpperCase();
                badge.className = 'platform-badge';
                if (data.platform === 'tiktok') badge.classList.add('badge-tt');
                else if (data.platform === 'instagram') badge.classList.add('badge-ig');
                else if (data.platform === 'x') badge.classList.add('badge-x');

                // Body
                const body = document.getElementById('resultBody');
                const actions = document.getElementById('resultActions');
                body.innerHTML = '';
                actions.innerHTML = '';

                // TikTok video
                if (data.video_no_watermark) {
                    body.innerHTML = `<video controls poster="${cover}" src="${data.video_no_watermark}"></video>`;
                    const dur = data.duration ? Math.floor(data.duration/60)+':'+String(data.duration%60).padStart(2,'0') : '';
                    actions.innerHTML = `
                        <a href="#" class="btn-action primary" onclick="forceDownload('${data.video_no_watermark.replace(/'/g,"\\'")}','moydl_tiktok_${dur}.mp4',this);return false">
                            <span class="icon">📥</span>
                            <span class="label">Video HD<span class="badge-hd">NO WM</span><small>${dur} · TikTok</small></span>
                        </a>
                        ${data.music ? `
                        <a href="#" class="btn-action accent" onclick="forceDownload('${data.music.replace(/'/g,"\\'")}','moydl_tiktok_audio.mp3',this);return false">
                            <span class="icon">🎵</span>
                            <span class="label">Audio MP3<small>Musik saja</small></span>
                        </a>` : ''}
                    `;
                }
                // TikTok photo slideshow
                else if (data.media && data.media.length && data.platform === 'tiktok') {
                    body.innerHTML = '<div class="media-grid">' + data.media.map((m, i) =>
                        `<img src="${m.url}" alt="Slide ${i + 1}" loading="lazy">`
                    ).join('') + '</div>';
                    actions.innerHTML =
                        (data.media.length > 2 ? '<a href="#" class="btn-action btn-dl-all" onclick="downloadAll(event);return false" data-urls="' + data.media.map(m => encodeURIComponent(m.url)).join(',') + '" data-types="' + data.media.map(m => m.type).join(',') + '"><span class="icon">📦</span> Download All ('+data.media.length+' photos)</a><div class="divider"></div>' : '') +
                        data.media.map((m, i) =>
                            `<a href="#" class="btn-action outline" onclick="forceDownload('${m.url.replace(/'/g,"\\'")}','moydl_tiktok_photo_${i+1}.jpg',this);return false">
                                <span class="icon">📷</span>
                                <span class="label">Foto #${i+1}<small>TikTok Slideshow</small></span>
                            </a>`
                        ).join('');
                    if (data.music) {
                        actions.innerHTML += `<div class="divider"></div>
                        <a href="#" class="btn-action accent" onclick="forceDownload('${data.music.replace(/'/g,"\\'")}','moydl_tiktok_audio.mp3',this);return false">
                            <span class="icon">🎵</span>
                            <span class="label">Audio MP3<small>Musik slideshow</small></span>
                        </a>`;
                    }
                }
                // IG single media
                else if (data.media_url) {
                    if (data.type === 'video') {
                        body.innerHTML = `<video controls poster="${cover}" src="${data.media_url}"></video>`;
                    } else {
                        body.innerHTML = `<img src="${data.media_url}" alt="">`;
                    }
                    const igType = data.type === 'video' ? 'Reel' : 'Post';
                    const igExt = data.type === 'video' ? '.mp4' : '.jpg';
                    actions.innerHTML = `
                        <a href="#" class="btn-action primary" onclick="forceDownload('${data.media_url.replace(/'/g,"\\'")}','moydl_ig_${igType.toLowerCase()}${igExt}',this);return false">
                            <span class="icon">📥</span>
                            <span class="label">Download ${igType}<small>Instagram</small></span>
                        </a>
                    `;
                }
                // X multiple media
                else if (data.media && data.media.length) {
                    const isVideo = data.media.some(m => m.type === 'video' || m.type === 'gif');
                    body.innerHTML = '<div class="media-grid">' + data.media.map((m, i) => {
                        if (m.type === 'video' || m.type === 'gif') {
                            const proxyUrl = '/api/proxy/media?url=' + encodeURIComponent(m.url);
                            return `<video controls src="${proxyUrl}" poster="${m.thumbnail || ''}"></video>`;
                        }
                        return `<img src="${m.url}" alt="Media ${i + 1}" loading="lazy">`;
                    }).join('') + '</div>';

                    const res = m => m.type === 'video' ? '720p' : (m.size ? (m.size.width+'×'+m.size.height) : '');
                    actions.innerHTML =
                        (data.media.length > 2 ? '<a href="#" class="btn-action btn-dl-all" onclick="downloadAll(event);return false" data-urls="' + data.media.map(m => encodeURIComponent(m.url)).join(',') + '" data-types="' + data.media.map(m => m.type).join(',') + '"><span class="icon">📦</span> Download All ('+data.media.length+' files)</a><div class="divider"></div>' : '') +
                        data.media.map((m, i) => {
                            const dlUrl = (m.type === 'video' || m.type === 'gif')
                                ? '/api/proxy/media?url=' + encodeURIComponent(m.url)
                                : m.url;
                            const icon = m.type === 'video' ? '🎬' : m.type === 'gif' ? '🖼' : '📷';
                            const label = m.type === 'video' ? 'Video' : m.type === 'gif' ? 'GIF' : 'Image';
                            const ext = m.type === 'video' ? '.mp4' : m.type === 'gif' ? '.gif' : '.jpg';
                            return `<a href="#" class="btn-action outline" onclick="forceDownload('${dlUrl.replace(/'/g,"\\'")}','moydl_x_${label.toLowerCase()}_${i+1}${ext}',this);return false">
                                <span class="icon">${icon}</span>
                                <span class="label">${label} #${i+1}<small>${res(m) || 'X/Twitter'}</small></span>
                            </a>`;
                        }).join('');
                }

                result.classList.add('show');
                result.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (e) {
                error.textContent = '❌ ' + e.message;
                error.classList.add('show');
                error.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }
    </script>
</body>
